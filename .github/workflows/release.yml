name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag to release (e.g. v1.2.3)'
        required: true

concurrency:
  group: release-${{ inputs.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build and Release Extension
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ inputs.tag_name || github.ref_name }}
    steps:

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag_name || github.ref_name }}

      - name: Validate version matches tag
        run: |
          PKG_VERSION=$(jq -r '.version' extension/package.json)
          TAG_VERSION="${TAG_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: package.json version ($PKG_VERSION) does not match tag ($TAG_VERSION)"
            exit 1
          fi
          echo "VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Check for duplicate release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$TAG_NAME" &>/dev/null; then
            echo "ERROR: GitHub Release $TAG_NAME already exists"
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Lint
        run: npm run lint
        working-directory: extension

      - name: Unit tests
        run: npm test
        working-directory: extension

      - name: Build extension
        run: npm run build
        working-directory: extension

      - name: Zip extension
        run: npm run zip
        working-directory: extension

      - name: Create password-protected archive
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -dc 'A-Za-z0-9' | head -c 8)
          echo "::add-mask::$PASSWORD"
          ARCHIVE="ytsummary-v${{ env.VERSION }}.zip"
          7za a -tzip -p"$PASSWORD" "$ARCHIVE" extension/.output/*.zip
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"
          echo "ARCHIVE_PASSWORD=$PASSWORD" >> "$GITHUB_ENV"
          gh secret set EXTENSION_ZIP_PASSWORD -b "$PASSWORD" --repo "$GITHUB_REPOSITORY"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$TAG_NAME" \
            --title "$TAG_NAME" \
            --generate-notes \
            "${{ env.ARCHIVE }}"

      - name: Email archive password
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.office365.com
          server_port: 587
          secure: false
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "ytsummary v${{ env.VERSION }} release archive password"
          to: kippolitov@5kkg35.onmicrosoft.com
          from: ${{ secrets.SMTP_USERNAME }}
          body: |
            The password for ytsummary-v${{ env.VERSION }}.zip attached to the GitHub Release is:

            ${{ env.ARCHIVE_PASSWORD }}
