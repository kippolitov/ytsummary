name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Serialize main-branch deployments; never cancel an in-progress deploy.
concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── CI gate (mirrors ci.yml) ──────────────────────────────────────────────
  extension-ci:
    name: Extension CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Lint
        run: npm run lint
        working-directory: extension

      - name: Unit tests
        uses: ./.github/actions/unit-tests
        with:
          working-directory: extension
          name: extension

      # No artifact is uploaded: builds with baked-in secrets must not be
      # publicly downloadable. Distribution happens via the release workflow,
      # which publishes to the private ytsummary-releases repo.
      - name: Build
        env:
          WXT_AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}
          WXT_AZURE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTION_KEY }}
        run: npm run build
        working-directory: extension

  functions-ci:
    name: Functions CI
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Lint
        run: npm run lint
        working-directory: functions

      - name: Unit tests
        uses: ./.github/actions/unit-tests
        with:
          working-directory: functions
          name: functions
          test-filter: tests/unit

      - name: Build
        run: npm run build
        working-directory: functions

  # ── Coverage report → GitHub Pages ───────────────────────────────────────
  publish-coverage:
    name: Publish Coverage to Pages
    runs-on: ubuntu-latest
    needs: [extension-ci, functions-ci]
    # Prevent concurrent Pages deployments: only one can be in-flight at a time.
    concurrency:
      group: pages
      cancel-in-progress: false
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Download extension coverage
        uses: actions/download-artifact@v4
        with:
          name: extension-test-coverage-reports
          path: pages/extension

      - name: Download functions coverage
        uses: actions/download-artifact@v4
        with:
          name: functions-test-coverage-reports
          path: pages/functions

      - name: Copy legal pages
        run: |
          mkdir -p pages/legal
          cp docs/legal/privacy-policy.html pages/legal/
          cp docs/legal/terms.html pages/legal/

      - name: Create index page
        run: |
          cat > pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head><meta charset="utf-8"><title>Video Knowledge Panel</title></head>
          <body>
            <h1>Video Knowledge Panel</h1>
            <ul>
              <li><a href="legal/privacy-policy.html">Privacy Policy</a></li>
              <li><a href="legal/terms.html">Terms of Service</a></li>
            </ul>
            <h2>Coverage Reports</h2>
            <ul>
              <li><a href="extension/coverage/">Extension</a></li>
              <li><a href="functions/coverage/">Functions</a></li>
            </ul>
          </body>
          </html>
          EOF

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  # ── Azure Functions deployment ────────────────────────────────────────────
  deploy-functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: [functions-ci]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions/

  # ── Auto version bump + tag (triggers release.yml) ───────────────────────
  version-and-tag:
    name: Version and Tag
    runs-on: ubuntu-latest
    needs: [extension-ci, functions-ci]
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Bump version in extension/package.json
        id: bump
        run: |
          BUMP="${{ inputs.bump || 'patch' }}"
          cd extension
          npm version $BUMP --no-git-tag-version
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/package.json extension/package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.VERSION }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.bump.outputs.VERSION }}" -m "Release v${{ steps.bump.outputs.VERSION }}"
          git push origin "v${{ steps.bump.outputs.VERSION }}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run release.yml --ref main -f tag_name="v${{ steps.bump.outputs.VERSION }}"
