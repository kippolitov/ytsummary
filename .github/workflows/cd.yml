name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

# Serialize main-branch deployments; never cancel an in-progress deploy.
concurrency:
  group: cd-main
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── CI gate (mirrors ci.yml) ──────────────────────────────────────────────
  extension-ci:
    name: Extension CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Lint
        run: npm run lint
        working-directory: extension

      - name: Unit tests
        run: npm test
        working-directory: extension

      - name: Build
        env:
          WXT_AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}
          WXT_AZURE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTION_KEY }}
        run: npm run build
        working-directory: extension

  functions-ci:
    name: Functions CI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Lint
        run: npm run lint
        working-directory: functions

      - name: Unit tests
        run: npm test
        working-directory: functions

      - name: Build
        run: npm run build
        working-directory: functions

  # ── Extension packaging ───────────────────────────────────────────────────
  package-extension:
    name: Package Extension
    runs-on: ubuntu-latest
    needs: [extension-ci]
    # secrets:write is not available on GITHUB_TOKEN; gh secret set uses GH_PAT.
    # GH_PAT must be a fine-grained or classic PAT with repo > secrets write scope.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: extension

      - name: Build extension
        env:
          WXT_AZURE_FUNCTION_URL: ${{ secrets.AZURE_FUNCTION_URL }}
          WXT_AZURE_FUNCTION_KEY: ${{ secrets.AZURE_FUNCTION_KEY }}
        run: npm run build
        working-directory: extension

      - name: Zip extension (WXT)
        run: npm run zip
        working-directory: extension

      - name: Generate password, create protected archive, and store secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          PASSWORD=$(openssl rand -base64 12 | tr -dc 'A-Za-z0-9' | head -c 8)
          echo "::add-mask::$PASSWORD"
          7za a -tzip -p"$PASSWORD" "extension-${{ github.sha }}.zip" extension/.output/*.zip
          gh secret set EXTENSION_ZIP_PASSWORD -b "$PASSWORD" --repo "$GITHUB_REPOSITORY"

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ github.sha }}
          path: extension-${{ github.sha }}.zip
          retention-days: 30

  # ── Azure Functions deployment ────────────────────────────────────────────
  deploy-functions:
    name: Deploy Functions
    runs-on: ubuntu-latest
    needs: [functions-ci]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: functions

      - name: Build TypeScript
        run: npm run build
        working-directory: functions

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Functions
        uses: azure/functions-action@v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: functions/

  # ── Auto version bump + tag (triggers release.yml) ───────────────────────
  version-and-tag:
    name: Version and Tag
    runs-on: ubuntu-latest
    needs: [extension-ci, functions-ci]
    if: "github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, 'chore: bump version')"
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Pull latest main
        run: git pull --rebase origin main

      - name: Bump version in extension/package.json
        id: bump
        run: |
          BUMP="${{ inputs.bump || 'patch' }}"
          cd extension
          npm version $BUMP --no-git-tag-version
          VERSION=$(jq -r '.version' package.json)
          echo "VERSION=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add extension/package.json extension/package-lock.json
          git commit -m "chore: bump version to ${{ steps.bump.outputs.VERSION }} [skip ci]"
          git push

      - name: Create and push tag
        run: |
          git tag -a "v${{ steps.bump.outputs.VERSION }}" -m "Release v${{ steps.bump.outputs.VERSION }}"
          git push origin "v${{ steps.bump.outputs.VERSION }}"

      - name: Trigger release workflow
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh workflow run release.yml --ref main -f tag_name="v${{ steps.bump.outputs.VERSION }}"
